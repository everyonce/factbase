# Factbase Configuration
# Place at ~/.config/factbase/config.yaml (global)
# or .factbase/config.yaml (per-repo, takes priority)

database:
  path: ~/.local/share/factbase/factbase.db
  pool_size: 4          # Connection pool size (1-32)
  compression: none     # Content compression: none or zstd

watcher:
  debounce_ms: 500      # Debounce window for file changes
  ignore_patterns:
    - ".*/**"           # Hidden directories (.git, .factbase, etc.)
    - "*.swp"
    - "*.tmp"
    - "*~"
    - ".DS_Store"

processor:
  max_file_size: 1048576       # Max file size in bytes (1MB)
  snippet_length: 200          # Search result snippet length
  chunk_size: 100000           # Embedding chunk size in chars (for large docs)
  chunk_overlap: 2000          # Overlap between chunks for context continuity
  embedding_batch_size: 10     # Docs per embedding API call (1-100)
  link_batch_size: 5           # Docs per link detection batch (1-50)
  check_concurrency: 5          # Parallel lint/cross-validation (1-20)

embedding:
  provider: bedrock
  profile: default             # AWS profile name (optional, uses default credentials if omitted)
  region: us-east-1            # AWS region
  model: amazon.nova-2-multimodal-embeddings-v1:0
  dimension: 1024
  cache_size: 100              # Query embedding cache (1-10000)
  timeout_secs: 30             # HTTP timeout (1-300)

llm:
  provider: bedrock
  profile: default             # AWS profile name (optional, uses default credentials if omitted)
  region: us-east-1            # AWS region
  model: us.anthropic.claude-haiku-4-5-20251001-v1:0
  timeout_secs: 30             # HTTP timeout (1-300)

# --- Alternative: Ollama (self-hosted) ---
# See docs/inference-providers.md for setup instructions.
#
# embedding:
#   provider: ollama
#   base_url: http://localhost:11434
#   model: qwen3-embedding:0.6b   # 1024 dims, 32K context
#   dimension: 1024
#   cache_size: 100
#   timeout_secs: 30
#
# llm:
#   provider: ollama
#   base_url: http://localhost:11434
#   model: rnj-1-extended          # Extended context model (49K)
#   timeout_secs: 30
#
# ollama:
#   max_retries: 3         # Retry count for failed requests
#   retry_delay_ms: 1000   # Delay between retries

rate_limit:
  per_second: 10    # MCP server rate limit
  burst_size: 20    # Burst capacity

server:
  host: 127.0.0.1   # MCP server host
  port: 3000        # MCP server port
  time_budget_secs: 30  # Time budget for document-scaling MCP operations (5-60)

web:
  enabled: false    # Enable web UI (requires 'web' feature)
  port: 3001        # Web UI port

cross_validate:
  fact_similarity_threshold: 0.5  # Minimum cosine similarity for fact pairs (0.0-1.0)
  batch_size: 10                  # Fact pairs per LLM batch call (1-50)

# --- Prompt Templates ---
# Override any LLM prompt template. Use {placeholder} for variables.
# If a key is absent, the built-in default is used.
#
# prompts:
#   # Design KB structure for a domain (vars: domain, entity_types)
#   bootstrap: "Design a knowledge base for: {domain}{entity_types}..."
#
#   # Rewrite a document section with changes (vars: section, changes)
#   rewrite_section: "Rewrite this:\n{section}\n\nChanges:\n{changes}"
#
#   # Merge inbox notes into a document (vars: document_content, inbox_content)
#   inbox_merge: "Integrate inbox into document:\n{document_content}\n\n{inbox_content}"
#
#   # Merge facts from multiple documents (vars: doc_title, keep_facts, merge_facts)
#   organize_merge: "Merge into \"{doc_title}\":\n{keep_facts}\n{merge_facts}"
#
#   # Split a document into sections (vars: doc_title, sections, facts)
#   organize_split: "Split \"{doc_title}\":\n{sections}\n{facts}"
#
#   # Cross-validate facts against other documents (vars: doc_title, fact_batch)
#   cross_validate: "Validate facts in \"{doc_title}\":\n{fact_batch}"
#
#   # Cross-validate fact pairs from different documents (vars: fact_pairs)
#   cross_validate_pairs: "Compare these fact pairs:\n{fact_pairs}"
#
#   # Detect entity mentions in a single document (vars: entities_list, content)
#   link_detect: "Find mentions of:\n{entities_list}\n\nIn:\n{content}"
#
#   # Detect entity mentions across multiple documents (vars: entities_list, docs_section)
#   link_detect_batch: "Find mentions of:\n{entities_list}\n\nIn:\n{docs_section}"
