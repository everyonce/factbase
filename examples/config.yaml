# Factbase Configuration
# Place at ~/.config/factbase/config.yaml (global)
# or .factbase/config.yaml (per-repo, takes priority)

database:
  path: ~/.local/share/factbase/factbase.db
  pool_size: 4          # Connection pool size (1-32)
  compression: none     # Content compression: none or zstd

watcher:
  debounce_ms: 500      # Debounce window for file changes
  ignore_patterns:
    - ".*/**"           # Hidden directories (.git, .factbase, etc.)
    - "*.swp"
    - "*.tmp"
    - "*~"
    - ".DS_Store"

processor:
  max_file_size: 1048576       # Max file size in bytes (1MB)
  snippet_length: 200          # Search result snippet length
  chunk_size: 100000           # Embedding chunk size in chars (for large docs)
  chunk_overlap: 2000          # Overlap between chunks for context continuity
  embedding_batch_size: 10     # Docs per embedding API call (1-100)
  link_batch_size: 5           # Docs per link detection batch (1-50)
  check_concurrency: 5          # Parallel lint/cross-validation (1-20)

# --- Embedding Configuration ---
# By default, factbase uses local CPU embeddings (no config needed).
# Uncomment one of the sections below to use a cloud provider instead.

# --- Default: Local CPU embeddings (zero config) ---
# embedding:
#   provider: local
# Uses BGE-small-en-v1.5 (384-dim, ~33MB download on first use)
# Good for knowledge bases under ~5000 documents

# --- Option 1: Amazon Bedrock (higher quality, requires AWS credentials) ---
embedding:
  provider: bedrock
  profile: default             # AWS profile name (optional, uses default credentials if omitted)
  region: us-east-1            # AWS region
  model: amazon.nova-2-multimodal-embeddings-v1:0
  dimension: 1024
  cache_size: 100              # Query embedding cache (1-10000)
  timeout_secs: 30             # HTTP timeout (1-300)

# --- Option 2: Ollama (self-hosted) ---
# See docs/inference-providers.md for setup instructions.
#
# embedding:
#   provider: ollama
#   base_url: http://localhost:11434
#   model: qwen3-embedding:0.6b   # 1024 dims, 32K context
#   dimension: 1024
#   cache_size: 100
#   timeout_secs: 30
#
# ollama:
#   max_retries: 3         # Retry count for failed requests
#   retry_delay_ms: 1000   # Delay between retries

# NOTE: If you switch providers after scanning, run `factbase scan --reindex`
# to rebuild all embeddings with the new dimension.

rate_limit:
  per_second: 10    # MCP server rate limit
  burst_size: 20    # Burst capacity

server:
  host: 127.0.0.1   # MCP server host
  port: 3000        # MCP server port
  time_budget_secs: 180  # Time budget for document-scaling MCP operations (5-600)

web:
  enabled: false    # Enable web UI (requires 'web' feature)
  port: 3001        # Web UI port

cross_validate:
  fact_similarity_threshold: 0.5  # Minimum cosine similarity for fact pairs (0.0-1.0)
  batch_size: 10                  # Fact pairs per batch (1-50)

temporal:
  min_coverage: 0.8               # Minimum temporal tag coverage threshold (0.0-1.0)
  recency_window_days: 180        # Window for recency boost (days)
  recency_boost_factor: 0.2       # Max boost for recent @t[~...] facts (0.0-1.0)

# --- Workflow Text Overrides ---
# Override any workflow step instruction text via flat keys.
# Use {placeholder} for dynamic parts; unknown placeholders are left as-is.
#
# workflows:
#   update.scan: |
#     Custom scan instructions...
#     {ctx}
