#   timeout_secs: 30
#
# ollama:
#   max_retries: 3         # Retry count for failed requests
#   retry_delay_ms: 1000   # Delay between retries

rate_limit:
  per_second: 10    # MCP server rate limit
  burst_size: 20    # Burst capacity

server:
  host: 127.0.0.1   # MCP server host
  port: 3000        # MCP server port

web:
  enabled: false    # Enable web UI (requires 'web' feature)
  port: 3001        # Web UI port
