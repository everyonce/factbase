focus: "History and evolution of jazz standards in American music"
organization: "Factbase prompt evaluation test KB"
allowed_types:
  - standard
  - composer
  - recording
  - venue
  - definition
review:
  stale_days: 365
  required_fields:
    standard: [composed_year, composer]
    composer: [birth_year, primary_instrument]
    recording: [year, label]
citation_patterns:
  - name: catalog_number
    pattern: "[A-Z]{1,3}[- ]?\\d+"
    description: "Record label catalog numbers (CL 1355, SD 1361, BN 1568)"
